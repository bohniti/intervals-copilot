services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-journal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-journal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-journal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-journal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-journal}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-moonshotai/kimi-k2.5}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      INTERVALS_ICU_ATHLETE_ID: ${INTERVALS_ICU_ATHLETE_ID}
      INTERVALS_ICU_API_KEY: ${INTERVALS_ICU_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: '["https://tbohnstedt.cloud"]'
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:4317
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:latest
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Observability stack — Tailscale-only access ────────────────────────────

  loki:
    image: grafana/loki:3.2.0
    user: root
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      # iptables DOCKER-USER rules restrict these to Tailscale (100.64.0.0/10) only
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://100.102.206.58:3001"
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      # iptables DOCKER-USER rules restrict these to Tailscale (100.64.0.0/10) only
      - "6006:6006"   # UI
      - "4317:4317"   # OTLP gRPC collector
    volumes:
      - phoenix_data:/phoenix
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    restart: unless-stopped

volumes:
  pgdata:
  loki_data:
  grafana_data:
  phoenix_data:
