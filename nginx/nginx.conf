events {
    worker_connections 1024;
}

http {
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }
    upstream grafana  { server grafana:3000; }
    upstream phoenix  { server phoenix:6006; }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name tbohnstedt.cloud;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name tbohnstedt.cloud;

        ssl_certificate     /etc/letsencrypt/live/tbohnstedt.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tbohnstedt.cloud/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API → backend (strip /api prefix)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana (Grafana handles /grafana sub-path internally)
        location /grafana/ {
            proxy_pass http://grafana/grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Phoenix LLM tracing UI
        location /phoenix/ {
            proxy_pass http://phoenix/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
